name: Docs

on:
  push:
  pull_request:

jobs:
  docs:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install TeX
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            texlive-latex-base \
            texlive-latex-extra \
            texlive-bibtex-extra \
            texlive-luatex

      - name: Build documentation
        working-directory: doc
        run: |
          pdflatex rapport
          bibtex rapport
          pdflatex rapport
          pdflatex rapport
          texlua checkcites.lua --unused rapport.aux
